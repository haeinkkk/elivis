# 루트에서: pnpm build:desktop — 웹은 서버에 배포하고, 앱은 ELIVIS_WEB_URL 원격 로드
appId: com.elivis.desktop
productName: Elivis
copyright: Copyright © Elivis

# pnpm 모노레포에서 @electron/rebuild가 워크스페이스 잔여 링크를 잘못 스캔하는 경우가 있어 비활성화
npmRebuild: false

# 로컬/CI에서 코드 서명 없이 빌드 (Windows에서 winCodeSign 캐시 심볼릭 링크 오류 방지)
forceCodeSigning: false

directories:
  output: release
  buildResources: build

# 아이콘 원본: icons/windows — icon.ico 또는 favicon.ico / mac — icon.icns 또는 favicon.icns
# Windows ICO 는 256×256 포함 권장. mac ICNS 없으면 기본 아이콘으로 빌드될 수 있음.
files:
  - dist/**/*
  - static/**/*
  - package.json

win:
  # 실행 파일 메타데이터 서명·winCodeSign 미사용 (로컬 빌드 시 7z 심볼릭 링크 오류 방지)
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false
  # portable: 단일 .exe, NSIS/winCodeSign(심볼릭 링크) 없이 Windows 로컬 빌드에 유리
  target:
    - portable
  artifactName: "${productName}-${version}.${ext}"

mac:
  target:
    - dmg
  category: public.app-category.productivity

linux:
  target:
    - AppImage
  category: Office
